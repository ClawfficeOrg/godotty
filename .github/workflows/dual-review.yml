name: Dual Review (Claude + GPT-5)

# Runs Claude + GPT-5 reviews on every PR. The two reviewers use different
# lenses; see .github/skills/review/dual-review/SKILL.md.
#
# Both steps are tolerant: if a key/secret is missing, that reviewer is
# skipped with a warning. CI does not fail solely on a missing reviewer.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    name: Claude review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Anthropic key
        id: key
        run: |
          if [[ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::ANTHROPIC_API_KEY not set — Claude review skipped"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Claude reviewer
        if: steps.key.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v0
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: review
          review_skill_path: .github/skills/review/dual-review/SKILL.md
        continue-on-error: true

      - name: Note skip
        if: steps.key.outputs.skip == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Claude review — skipped
            `ANTHROPIC_API_KEY` secret not set; configure it in repo settings.

  gpt5-review:
    name: GPT-5 review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for OpenAI key
        id: key
        run: |
          if [[ -z "${{ secrets.OPENAI_API_KEY }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::OPENAI_API_KEY not set — GPT-5 review skipped"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.key.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        if: steps.key.outputs.skip != 'true'
        run: pip install openai requests

      - name: Run GPT-5 reviewer
        if: steps.key.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.repository }}
        run: python .github/agents/gpt5_reviewer.py
        continue-on-error: true

      - name: Note skip
        if: steps.key.outputs.skip == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## GPT-5 review — skipped
            `OPENAI_API_KEY` secret not set; configure it in repo settings.

  synthesis:
    name: Synthesis (advisory)
    runs-on: ubuntu-latest
    needs: [claude-review, gpt5-review]
    if: always()
    steps:
      - name: Note
        run: |
          echo "Synthesis is a future enhancement — for now, the human reads"
          echo "both review comments and decides. See dual-review skill."
