name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6-stable"

jobs:
  lint:
    name: Lint (gdformat + gdlint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gdtoolkit
        run: pip install --upgrade "gdtoolkit==4.*"

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint
        run: scripts/lint.sh

  test-linux:
    name: Test (Linux, Godot ${{ env.GODOT_VERSION }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          cd ~/godot
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            || curl -fsSL -o godot.zip \
            "https://downloads.tuxfamily.org/godotengine/${GODOT_VERSION%-stable}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          mv Godot_v* godot4
          chmod +x godot4

      - name: Make godot4 available on PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Verify Godot
        run: godot4 --version || true

      - name: Install GdUnit4
        run: scripts/install_gdunit4.sh || echo "gdunit install soft-fail (will be addressed in spec 0002)"

      - name: Run tests
        env:
          CI: "true"
        run: scripts/run_tests.sh

  parse-check:
    name: GDScript parse check
    runs-on: ubuntu-latest
    needs: test-linux
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Soft success
        run: echo "Reserved for future Godot --check-only run; see spec backlog."
