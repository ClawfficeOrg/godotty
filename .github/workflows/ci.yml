name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6-stable"

jobs:
  lint:
    name: Lint (gdformat + gdlint + shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install gdtoolkit
        run: pip install --upgrade "gdtoolkit==4.*"

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint
        run: scripts/lint.sh

  test-linux:
    name: Test (Linux, Godot 4.6-stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-4.6-stable-linux

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          cd ~/godot
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip" \
            || curl -fsSL -o godot.zip \
            "https://downloads.tuxfamily.org/godotengine/${GODOT_VERSION%-stable}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q godot.zip
          mv Godot_v* godot4
          chmod +x godot4

      - name: Make godot4 available on PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Verify Godot
        run: godot4 --version || true

      - name: Remove godotty-node GDExtension (mock-mode tests only)
        run: |
          # The godotty-node dylib is not built in CI (real-mode tests are
          # tracked under spec 0003). On macOS, Godot crashes hard with an
          # NSException when the .gdextension points at a missing dylib; on
          # Linux it's a soft warning. Remove the addon so both platforms
          # behave the same.
          rm -rf project/addons/godotty-node

      - name: Install GdUnit4
        run: scripts/install_gdunit4.sh

      - name: Run tests
        run: scripts/run_tests.sh tests/unit

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: build/test-results/
          if-no-files-found: ignore

  test-macos:
    name: Test (macOS, Godot 4.6-stable)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-4.6-stable-macos-universal

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot
          cd ~/godot
          curl -fsSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_macos.universal.zip"
          unzip -q godot.zip
          # Wrapper so that `godot4` resolves to the binary inside the .app bundle.
          cat > godot4 <<'EOF'
          #!/usr/bin/env bash
          exec "$(dirname "$0")/Godot.app/Contents/MacOS/Godot" "$@"
          EOF
          chmod +x godot4

      - name: Make godot4 available on PATH
        run: echo "$HOME/godot" >> "$GITHUB_PATH"

      - name: Verify Godot
        run: godot4 --version || true

      - name: Remove godotty-node GDExtension (mock-mode tests only)
        run: rm -rf project/addons/godotty-node

      - name: Install GdUnit4
        run: scripts/install_gdunit4.sh

      - name: Run tests
        run: scripts/run_tests.sh tests/unit

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-macos
          path: build/test-results/
          if-no-files-found: ignore

  parse-check:
    name: GDScript parse check
    runs-on: ubuntu-latest
    needs: [test-linux, test-macos]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Soft success
        run: echo "Reserved for future Godot --check-only run; see spec backlog."
